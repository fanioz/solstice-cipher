# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: ""

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership: []

# Example:
#
# state_ownership:
#   - state: player_health
#     status: active           # active | superseded_by: ADR-NNNN
#     owner_system: health-system
#     adr: docs/architecture/adr-0001-health-system.md
#     interface: "HealthComponent.current_health (read-only float, range 0–max_health)"
#     write_access: health-system-only   # only owner can write; others read
#     referenced_by:
#       - docs/architecture/adr-0001-health-system.md
#       - docs/architecture/adr-0003-combat-system.md   # reads to apply damage
#       - docs/architecture/adr-0007-ui-system.md       # reads to display HUD
#     added: 2026-03-26
#     revised: ""


# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: procedural_generation_complete
    status: active
    pattern: signal
    producer: procedural-puzzle-generator
    consumers:
      - level-manager
    adr: docs/architecture/adr-0004-procedural-generation-system.md
    signal_signature: "generation_complete(puzzle_nodes: Array[Node])"
    referenced_by:
      - docs/architecture/adr-0004-procedural-generation-system.md
    added: 2026-06-10
    revised: ""

# Example:
#
# interfaces:
#   - contract: damage_delivery
#     status: active
#     pattern: signal          # how the producer notifies consumers
#     producer: combat-system
#     consumers:
#       - health-system        # receives damage_dealt signal, applies to health
#       - ui-system            # receives damage_dealt signal, shows damage number
#       - audio-system         # receives damage_dealt signal, plays SFX
#     adr: docs/architecture/adr-0003-combat-system.md
#     signal_signature: "damage_dealt(amount: float, target: Node, is_crit: bool)"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#       - docs/architecture/adr-0001-health-system.md
#     added: 2026-03-26
#     revised: ""


# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
#     added: 2026-03-26
#     revised: ""
#
#   - system: combat
#     status: active
#     budget_ms: 2.0
#     adr: docs/architecture/adr-0003-combat-system.md
#     notes: "Includes physics queries, hitbox evaluation, and damage calculation"
#     referenced_by:
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: primary_language
    status: active
    api: GDScript
    not: C#
    adr: docs/architecture/adr-0001-core-gameplay-logic.md
    reason: "Project is already in GDScript, offers fastest iteration, and better compatibility with web exports."
    referenced_by:
      - docs/architecture/adr-0001-core-gameplay-logic.md
    added: 2026-06-09
    revised: ""
  - purpose: rendering_backend
    status: active
    api: Compatibility (OpenGL 3.3/WebGL 2)
    not: Forward+, Mobile
    adr: docs/architecture/adr-0002-rendering-engine.md
    reason: "Must support HTML5 web exports."
    referenced_by:
      - docs/architecture/adr-0002-rendering-engine.md
    added: 2026-06-09
    revised: ""
  - purpose: input_handling
    status: active
    api: Custom InputManager Autoload
    not: Input singleton (Input.is_action_pressed)
    adr: docs/architecture/adr-0003-input-handling.md
    reason: "Centralizes input for buffering, combo detection, and dual-focus UI separation."
    referenced_by:
      - docs/architecture/adr-0003-input-handling.md
    added: 2026-06-09
    revised: ""
  - purpose: procedural_generation_threading
    status: active
    api: coroutines (await get_tree().process_frame)
    not: WorkerThreadPool
    adr: docs/architecture/adr-0004-procedural-generation-system.md
    reason: "WorkerThreadPool risks breaking HTML5/Web export compatibility due to SharedArrayBuffer restrictions."
    referenced_by:
      - docs/architecture/adr-0004-procedural-generation-system.md
    added: 2026-06-10
    revised: ""
  - purpose: 3d_grid_static_elements
    status: 'superseded_by: ADR-0005'
    api: GridMap
    not: TileMapLayer, individual nodes
    adr: docs/architecture/adr-0004-procedural-generation-system.md
    reason: "GridMap provides internal batching optimizations for 3D static elements, which is critical when individual interactive elements must be spawned as Node3Ds."
    referenced_by:
      - docs/architecture/adr-0004-procedural-generation-system.md
    added: 2026-06-10
    revised: 2026-06-10
  - purpose: 3d_static_elements
    status: active
    api: modular Node3D/CSG components
    not: GridMap or TileMapLayer
    adr: docs/architecture/adr-0005-puzzle-solver-algorithm.md
    reason: "GridMap cannot physically support 15-degree off-grid ray intersections. Static walls must be built dynamically around the mathematical ray paths."
    referenced_by:
      - docs/architecture/adr-0005-puzzle-solver-algorithm.md
    added: 2026-06-10
    revised: ""
  - purpose: procedural_pathfinding
    status: active
    api: Pure GDScript custom A*
    not: Native AStar3D with GDScript overrides
    adr: docs/architecture/adr-0005-puzzle-solver-algorithm.md
    reason: "Overriding AStar3D heuristic methods in GDScript causes massive cross-language context-switching overhead per edge evaluation."
    referenced_by:
      - docs/architecture/adr-0005-puzzle-solver-algorithm.md
    added: 2026-06-10
    revised: ""
  - purpose: runtime_beam_propagation
    status: active
    api: PhysicsDirectSpaceState3D Raycasting (Jolt)
    not: Abstract Graph Traversal
    adr: docs/architecture/adr-0006-beam-propagation-system.md
    reason: "Abstract traversal cannot resolve endpoints when beams are rotated away from the mathematical path into procedural walls."
    referenced_by:
      - docs/architecture/adr-0006-beam-propagation-system.md
    added: 2026-06-10
    revised: ""
  - purpose: beam_convergence
    status: active
    api: Node-based Additive Color Blending
    not: Spatial Interference (Free-space blending)
    adr: docs/architecture/adr-0007-beam-convergence.md
    reason: "Node-based blending resolves paths deterministically via physics endpoints, while free-space blending requires complex volumetric intersections."
    referenced_by:
      - docs/architecture/adr-0007-beam-convergence.md
    added: 2026-06-10
    revised: ""
  - purpose: beam_color_math
    status: active
    api: HDR values (>1.0)
    not: Clamped to 1.0
    adr: docs/architecture/adr-0007-beam-convergence.md
    reason: "Godot 4.6 evaluates glow before tonemapping. HDR values properly trigger the bloom threshold while the tonemapper compresses it to screen space."
    referenced_by:
      - docs/architecture/adr-0007-beam-convergence.md
    added: 2026-06-10
    revised: ""
  - purpose: drag_and_drop
    status: active
    api: Decoupled Physics-based 3D Proxy Dragging
    not: Native Control Drag-and-Drop
    adr: docs/architecture/adr-0008-briefcase-ui.md
    reason: "Native Control drag cannot cross the 2D-to-3D space boundary effectively. Physics proxy provides tactile, mechanically robust 3D placement."
    referenced_by:
      - docs/architecture/adr-0008-briefcase-ui.md
    added: 2026-06-10
    revised: ""
  - purpose: save_system
    status: active
    api: Dictionary Serialization via FileAccess
    not: ResourceSaver / ResourceLoader
    adr: docs/architecture/adr-0009-save-system.md
    reason: "ResourceLoader executes _init() on embedded scripts before type validation, creating an Arbitrary Code Execution (ACE) vulnerability for shared save files."
    referenced_by:
      - docs/architecture/adr-0009-save-system.md
    added: 2026-06-10
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "Direct server calls avoid per-frame node overhead; 3× faster in profiling"
#     referenced_by:
#       - docs/architecture/adr-0002-physics-architecture.md
#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: untyped_gdscript
    status: active
    description: "GDScript files must not use dynamic typing for variables or return types. Always use static typing (e.g., `: int`, `-> void`)."
    why: "Dynamic typing leads to runtime errors. Static typing is required to maintain robustness, especially since we rejected C#."
    adr: docs/architecture/adr-0001-core-gameplay-logic.md
    added: 2026-06-09
  - pattern: forward_plus_features
    status: active
    description: "Do not use rendering features exclusive to Forward+ (e.g., SDFGI, VoxelGI, advanced SSR)."
    why: "The project uses the Compatibility renderer for HTML5 export. Forward+ features will break or not render correctly."
    adr: docs/architecture/adr-0002-rendering-engine.md
    added: 2026-06-09
  - pattern: native_input_queries
    status: active
    description: "Gameplay code must not call `Input.is_action_pressed` or `Input.get_vector` directly. All gameplay input must be queried through the `InputManager` autoload."
    why: "Direct native calls scatter input logic and break central features like input buffering or pausing."
    adr: docs/architecture/adr-0003-input-handling.md
    added: 2026-06-09
  - pattern: worker_thread_pool_for_generation
    status: active
    description: "Do not use WorkerThreadPool for core procedural generation or loading tasks."
    why: "Godot 4's WorkerThreadPool relies on SharedArrayBuffer, which can break HTML5/Web exports without specific server configurations."
    adr: docs/architecture/adr-0004-procedural-generation-system.md
    added: 2026-06-10
  - pattern: floating_point_drift
    status: active
    description: "Do not rely on implicit float math for iterative geometric intersections. Must explicitly quantize spatial math using snapped() at every step."
    why: "Cumulative floating-point drift will cause rays to miss targets over long multi-bounce sequences."
    adr: docs/architecture/adr-0005-puzzle-solver-algorithm.md
    added: 2026-06-10
  - pattern: infinite_optical_loops
    status: active
    description: "Must use an integer `max_bounces` limit to prevent stack overflows during raycasting or traversal."
    why: "Using a `visited` array or recursive function calls will crash the engine if the player creates an infinite optical loop."
    adr: docs/architecture/adr-0006-beam-propagation-system.md
    added: 2026-06-10
  - pattern: ghost_state_persistence
    status: active
    description: "Nodes must not retain incoming beam data across frames. Arrays must be explicitly cleared by the manager before raycasting begins."
    why: "If a beam is blocked upstream, the receiving node will falsely continue evaluating using state left over from the previous tick."
    adr: docs/architecture/adr-0007-beam-convergence.md
    added: 2026-06-10
  - pattern: native_input_in_physics_process
    status: active
    description: "Do not check `Input.is_action_just_released()` or `just_pressed()` inside `_physics_process()`."
    why: "Frame rate misalignment between physics ticks and rendering frames causes dropped inputs."
    adr: docs/architecture/adr-0008-briefcase-ui.md
    added: 2026-06-10
  - pattern: cross_domain_raycasting
    status: active
    description: "2D UI Managers (like BriefcaseManager) must not execute 3D Physics Server raycasts."
    why: "Couples UI state directly to the 3D physical world state, violating separation of concerns."
    adr: docs/architecture/adr-0008-briefcase-ui.md
    added: 2026-06-10
  - pattern: resource_save_files
    status: active
    description: "Do not use ResourceSaver or ResourceLoader to read/write player save files."
    why: "ResourceLoader will instantiate embedded scripts and execute _init() before type validation occurs, allowing malicious code execution from downloaded save files."
    adr: docs/architecture/adr-0009-save-system.md
    added: 2026-06-10
  - pattern: non_atomic_saves
    status: active
    description: "Do not write directly to the primary save file path."
    why: "If the game crashes or is terminated mid-write, the primary save file will be truncated and permanently corrupted. Must write to .tmp first and use DirAccess.rename()."
    adr: docs/architecture/adr-0009-save-system.md
    added: 2026-06-10

